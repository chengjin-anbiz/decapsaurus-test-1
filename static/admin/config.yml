- name: docs
  label: "Docs"
  folder: docs
  extension: md
  create: true
  publish: false
  nested: 
    depth: 100
    summary: "{{title}}"
    subfolders: false  
  meta: { path: { widget: string, label: 'Path', index_file: 'index' } }
  fields:
    - label: "ID"
      name: "id"
      widget: "string"
      required: false
      hint: "Optional. Defaults to file path if not set."
    - label: "Title"
      name: "title"
      widget: "string"
    - label: "Sidebar Label"
      name: "sidebar_label"
      widget: "string"
      required: false
    - label: "Description"
      name: "description"
      widget: "text"
      required: false
    - label: "Body"
      name: "body"
      widget: "markdown"