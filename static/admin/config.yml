local_backend: true

backend:
  name: github
  branch: main
  repo: chengjin-anbiz/decapsaurus-test-1
  squash_merges: true

publish_mode: editorial_workflow

# These lines should *not* be indented
media_folder: "static/img"
public_folder: "/img/"

